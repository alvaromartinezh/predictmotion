<script>
// ─── League config ────────────────────────────────────────────────────────
const LEAGUE = {
  promoSlots: 2,
  playoffTop: 6,
  relegSlots: 4,
  labels: {
    promo:   'Ascenso a Liga Hypermotion',
    playoff: 'Play-off de ascenso',
    perma:   'Permanencia',
    relega:  'Descenso a 2ª RFEF',
  },
};

const SIM_N  = 40000;
const P_HOME = 0.41;
const P_DRAW = 0.27;

const COLOR_PALETTE = [
  '#e11d48','#7c3aed','#2563eb','#0891b2','#059669','#ca8a04','#ea580c',
  '#db2777','#4f46e5','#0284c7','#16a34a','#d97706','#dc2626','#9333ea',
  '#0369a1','#15803d','#b45309','#be185d','#6d28d9','#0e7490','#166534','#92400e',
];

// ─── Seeded PRNG (mulberry32) ─────────────────────────────────────────────
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function standingsSeed(standings) {
  const str = standings.map(t => `${t.name}:${t.pts}:${t.gp}`).join('|');
  let h = 0;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return h >>> 0;
}
let rng = Math.random;

// ─── Zone helpers ─────────────────────────────────────────────────────────
function zoneOf(pos, numTeams) {
  if (pos <= LEAGUE.promoSlots)              return 'promo';
  if (pos <= LEAGUE.playoffTop)              return 'playoff';
  if (pos > numTeams - LEAGUE.relegSlots)    return 'relega';
  return 'none';
}

function getZoneLabels(numTeams) {
  const relegStart = numTeams - LEAGUE.relegSlots + 1;
  return {
    1:                       { text: LEAGUE.labels.promo,   cls: 'green' },
    [LEAGUE.promoSlots + 1]: { text: LEAGUE.labels.playoff, cls: 'blue'  },
    [LEAGUE.playoffTop + 1]: { text: LEAGUE.labels.perma,   cls: 'gray'  },
    [relegStart]:            { text: LEAGUE.labels.relega,  cls: 'red'   },
  };
}

// ─── Render legend (once, shared between groups) ──────────────────────────
function renderLegend(numTeams) {
  const relegStart = numTeams - LEAGUE.relegSlots + 1;
  document.getElementById('legend').innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>${LEAGUE.labels.promo} (1º–${LEAGUE.promoSlots}º por grupo)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Play-off (${LEAGUE.promoSlots + 1}º–${LEAGUE.playoffTop}º)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Descenso (${relegStart}º–${numTeams}º)</div>
  `;
}

// ─── Build group HTML sections ────────────────────────────────────────────
function buildGroupSections(groups) {
  const container = document.getElementById('groups-container');
  container.innerHTML = groups.map((g, idx) => `
    <div class="group-section">
      <div class="group-label" id="group-label-${idx}">${g.name}</div>
      <div class="card">
        <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:12px"></th>
              <th class="center" style="width:34px">#</th>
              <th>Equipo</th>
              <th class="right">Pts</th>
              <th class="right" style="color:var(--muted);font-size:.75rem">PJ</th>
              <th><span style="color:var(--green)">Ascenso directo</span></th>
              <th><span style="color:var(--blue)">Play-off</span></th>
              <th><span style="color:var(--red)">Descenso</span></th>
            </tr>
          </thead>
          <tbody id="tbody-${idx}"></tbody>
        </table>
        </div>
      </div>
    </div>
  `).join('');
}

// ─── Skeleton ─────────────────────────────────────────────────────────────
const SKELETON_GROUPS    = 2;
const SKELETON_PER_GROUP = 18;

function renderSkeleton() {
  const skeletonGroups = Array.from({ length: SKELETON_GROUPS }, (_, i) => ({
    name: `Grupo ${i + 1}`,
    entries: [],
  }));
  buildGroupSections(skeletonGroups);
  skeletonGroups.forEach((_, gi) => {
    let html = '';
    for (let i = 0; i < SKELETON_PER_GROUP; i++) {
      html += `<tr>
        <td style="padding:0 0 0 8px;width:12px"><div class="zone-bar none"></div></td>
        <td class="pos"><div class="skeleton" style="width:18px;height:14px"></div></td>
        <td><div class="team-cell">
          <div class="team-avatar" style="background:var(--surface2)"></div>
          <div class="skeleton" style="width:${90 + Math.random() * 60 | 0}px;height:14px"></div>
        </div></td>
        <td><div class="skeleton" style="width:24px;height:14px;margin-left:auto"></div></td>
        <td><div class="skeleton" style="width:24px;height:14px;margin-left:auto"></div></td>
        <td><div class="skeleton" style="width:80px;height:14px"></div></td>
        <td><div class="skeleton" style="width:80px;height:14px"></div></td>
        <td><div class="skeleton" style="width:80px;height:14px"></div></td>
      </tr>`;
    }
    document.getElementById(`tbody-${gi}`).innerHTML = html;
  });
}

// ─── Simulation ───────────────────────────────────────────────────────────
function simulateGroup(standings) {
  const numTeams = standings.length;
  const totalMd  = 2 * (numTeams - 1);
  rng = mulberry32(standingsSeed(standings));
  const names  = standings.map(t => t.name);
  const counts = Object.fromEntries(names.map(n => [n, { t2: 0, t6: 0, b4: 0 }]));
  const minGp  = Math.min(...standings.map(t => t.gp));
  const teamGp = Object.fromEntries(standings.map(t => [t.name, t.gp]));

  for (let i = 0; i < SIM_N; i++) {
    const pts = Object.fromEntries(standings.map(t => [t.name, t.pts]));
    const gd  = Object.fromEntries(standings.map(t => [t.name, t.gf - t.gc]));
    const gf  = Object.fromEntries(standings.map(t => [t.name, t.gf]));

    let mdNum = minGp;
    for (const md of buildFixtures(names, minGp, totalMd)) {
      mdNum++;
      for (const [h, a] of md) {
        if (teamGp[h] >= mdNum && teamGp[a] >= mdNum) continue;
        const r = rng();
        let hp, ap, hg, ag;
        if (r < P_HOME) {
          hp = 3; ap = 0;
          hg = (rng() * 2 | 0) + 1 + (rng() * 2 | 0);
          ag = rng() * 2 | 0;
        } else if (r < P_HOME + P_DRAW) {
          hp = ap = 1;
          hg = ag = rng() * 2 | 0;
        } else {
          hp = 0; ap = 3;
          hg = rng() * 2 | 0;
          ag = (rng() * 2 | 0) + 1 + (rng() * 2 | 0);
        }
        pts[h] += hp; pts[a] += ap;
        gd[h]  += hg - ag; gd[a] += ag - hg;
        gf[h]  += hg;      gf[a] += ag;
      }
    }

    const sorted = [...names].sort((a, b) =>
      pts[b] !== pts[a] ? pts[b] - pts[a] :
      gd[b]  !== gd[a]  ? gd[b] - gd[a]  :
      gf[b] - gf[a]);

    sorted.forEach((name, idx) => {
      const p = idx + 1;
      if      (p <= LEAGUE.promoSlots)           counts[name].t2++;
      else if (p <= LEAGUE.playoffTop)           counts[name].t6++;
      else if (p > numTeams - LEAGUE.relegSlots) counts[name].b4++;
    });
  }

  return Object.fromEntries(
    names.map(n => [n, {
      top2:    +(counts[n].t2 / SIM_N * 100).toFixed(1),
      playoff: +(counts[n].t6 / SIM_N * 100).toFixed(1),
      relega:  +(counts[n].b4 / SIM_N * 100).toFixed(1),
    }])
  );
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = rng() * (i + 1) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function buildFixtures(names, gp, totalMd) {
  const mds = [];
  for (let md = gp + 1; md <= totalMd; md++) {
    const t = shuffle([...names]);
    const day = [];
    for (let i = 0; i < t.length; i += 2) day.push([t[i], t[i + 1]]);
    mds.push(day);
  }
  return mds;
}

// ─── Render group ─────────────────────────────────────────────────────────
function pctBar(pct, colorClass) {
  const txt = pct === 0
    ? `<span style="color:var(--muted)">—</span>`
    : `${pct.toFixed(1)}%`;
  return `<div class="prob-cell">
    <div class="prob-header"><span class="prob-pct">${txt}</span></div>
    <div class="prob-bar-bg">
      <div class="prob-bar-fill ${colorClass}" style="width:0%" data-target="${pct}"></div>
    </div>
  </div>`;
}

function initials(name) {
  return name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
}

function renderGroup(standings, results, groupIdx) {
  const numTeams   = standings.length;
  const zoneLabels = getZoneLabels(numTeams);
  const tbody = document.getElementById(`tbody-${groupIdx}`);
  let html = '';

  standings.forEach((t, i) => {
    const z    = zoneOf(t.rank, numTeams);
    const res  = results[t.name] || { top2: 0, playoff: 0, relega: 0 };
    const zRow = z !== 'none' ? `zone-${z}` : '';
    const color = COLOR_PALETTE[i % COLOR_PALETTE.length];
    const avId = `av_${groupIdx}_${i}`;

    if (zoneLabels[t.rank]) {
      const { text, cls } = zoneLabels[t.rank];
      html += `<tr class="zone-label-row"><td colspan="8">
        <span class="zone-label-text ${cls}">${text}</span></td></tr>`;
    }

    html += `<tr class="${zRow}">
      <td style="padding:0 0 0 8px;width:12px"><div class="zone-bar ${z}"></div></td>
      <td class="pos">${t.rank}</td>
      <td>
        <div class="team-cell">
          <div class="team-avatar" id="${avId}">
            <img src="${t.logo || ''}" alt="${t.name}" loading="lazy"
              onerror="fallbackAvatar('${avId}','${t.name}','${color}')" />
          </div>
          <span class="team-name">${t.name}</span>
        </div>
      </td>
      <td class="pts">${t.pts}</td>
      <td class="right" style="color:var(--muted);font-size:.8rem">${t.gp}</td>
      <td>${pctBar(res.top2,    'fill-green')}</td>
      <td>${pctBar(res.playoff, 'fill-blue')}</td>
      <td>${pctBar(res.relega,  'fill-red')}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
  requestAnimationFrame(() => setTimeout(() => {
    tbody.querySelectorAll('.prob-bar-fill').forEach(el => {
      el.style.width = el.dataset.target + '%';
    });
  }, 80));
}

function fallbackAvatar(avId, name, color) {
  const el = document.getElementById(avId);
  if (!el) return;
  el.classList.add('fallback');
  el.style.background = color;
  el.style.color = '#fff';
  el.style.fontSize = '.68rem';
  el.style.fontWeight = '700';
  el.innerHTML = initials(name);
}

// ─── Fetch desde archivos JSON locales (generados por fetch_rfef.py) ──────
const CACHE_URLS = ['/cache/rfef_g1.json', '/cache/rfef_g2.json'];

async function fetchStandings() {
  const [g1, g2] = await Promise.all(
    CACHE_URLS.map(url => fetch(url).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status} al cargar ${url}`);
      return r.json();
    }))
  );
  return {
    groups: [
      { name: g1.group, entries: g1.standings },
      { name: g2.group, entries: g2.standings },
    ],
    updated: g1.updated,
    season:  g1.season,
  };
}

function setBadge(groups) {
  const maxGp = Math.max(...groups.flatMap(g => g.entries.map(t => t.gp)));
  document.getElementById('badge-jornada').innerHTML = `Jornada <strong>${maxGp}</strong>`;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.innerHTML = msg;
  el.style.display = 'block';
}

// ─── Main update flow ──────────────────────────────────────────────────────
let isUpdating = false;

async function triggerUpdate() {
  if (isUpdating) return;
  isUpdating = true;

  try {
    renderSkeleton();

    const { groups, updated, season } = await fetchStandings();

    const refTeams = groups[0]?.entries.length || SKELETON_PER_GROUP;
    renderLegend(refTeams);
    buildGroupSections(groups);
    setBadge(groups);
    await new Promise(r => setTimeout(r, 30));

    groups.forEach((g, gi) => {
      const results = simulateGroup(g.entries);
      renderGroup(g.entries, results, gi);
    });

    const updatedDate = updated ? new Date(updated) : new Date();
    const timeStr = updatedDate.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('footer-update').textContent =
      `Datos actualizados: ${timeStr} UTC · Temporada ${season}`;

  } catch (err) {
    console.error(err);
    showError(`Error al cargar los datos: ${err.message}`);
  } finally {
    isUpdating = false;
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────
renderSkeleton();
triggerUpdate();
</script>
