  - "Resumen de la jornada: clasificación de grupos.\n{cta}"
  - "Repaso nocturno de los grupos.\n{cta}"
  - "Foto final del día en los grupos.\n{cta}"

evening_thirds:
  - "Mejores terceros al cierre. ¿Quiénes pasarían ahora mismo?\n{cta}"
  - "Así queda la pelea por ser mejor tercero tras hoy.\n{cta}"
  - "Los 8 terceros que hoy estarían dentro.\n{cta}"
