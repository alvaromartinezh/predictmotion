# Plantillas de texto por tipo de evento.
#
# Reglas de estilo (para mantenerlas humanas):
#   - 0 o 1 emoji por plantilla. Frases cortas de Twitter.
#   - SIN sellos fijos: nada de "Copa del Mundo 2026" ni "Fase eliminatoria".
#   - El nombre del torneo es la variable {torneo} (hoy NO se usa, por decisión).
#   - Cada plantilla cierra con {cta}: una frase de llamada a la acción que YA
#     incluye el enlace (ver pool 'cta' abajo). Se elige una al azar para no
#     repetir siempre la misma coletilla. Sin hashtags (se gestionan fuera).
#
# Placeholders por evento:
#   kickoff          : grupo, local, visitante
#   gol              : grupo, equipo, local, visitante, score_h, score_a,
#                      marcador, minuto, [goleador], [jugada]
#   knockout_kickoff : local, visitante
#   knockout_gol     : equipo, local, visitante, score_h, score_a, marcador,
#                      minuto, [goleador], [jugada]
#   knockout_result  : local, visitante, score_h, score_a, marcador
#   morning_* / evening_* : (solo {cta})
#
# [entre corchetes] = placeholder OPCIONAL: la plantilla que lo use solo se
# elige si ese dato existe (lo filtra text_generator.py). Así puedes mezclar
# libremente variantes con y sin goleador/jugada sin que falle nada.

# ── Llamada a la acción (incluye el enlace). Se rota al azar; no repite seguida.
cta:
  - "Si quieres mantenerte informado de la suerte que corre tu equipo, visita: {url}"
  - "Sigue en directo lo que le espera a tu equipo: {url}"
  - "Mira la clasificación y las probabilidades de tu selección: {url}"
  - "¿Cómo le afecta a tu equipo? Compruébalo aquí: {url}"
  - "Toda la clasificación y las opciones de cada selección: {url}"

# ── Pitazo inicial (grupos) ────────────────────────────────────────────────────
kickoff:
  - "⚽ Rueda el balón en el Grupo {grupo}: {local} vs {visitante}.\n{cta}"
  - "Empieza {local} – {visitante}. Grupo {grupo} en juego.\n{cta}"
  - "🔴 En directo · {local} vs {visitante} (Grupo {grupo}).\n{cta}"
  - "Arranca el {local}–{visitante}. ¿Quién se acerca a octavos?\n{cta}"
  - "Grupo {grupo} en marcha: {local} vs {visitante}.\n{cta}"
  - "Ya juegan {local} y {visitante}. Grupo {grupo}.\n{cta}"
  - "{local} contra {visitante}, en juego. La tabla del Grupo {grupo} se mueve.\n{cta}"

# ── Gol (grupos) ───────────────────────────────────────────────────────────────
gol:
  # Centradas en el marcador / equipo (siempre disponibles)
  - "⚽ Gol de {equipo}. {local} {score_h}–{score_a} {visitante} · {minuto}'\n{cta}"
  - "Se mueve el marcador en el Grupo {grupo}.\n{local} {score_h}–{score_a} {visitante} ({minuto}')\n{cta}"
  - "{local} {score_h}–{score_a} {visitante}. Anota {equipo} en el {minuto}'.\n{cta}"
  - "¡Gol! {equipo} en el minuto {minuto}.\n{local} {score_h}–{score_a} {visitante}\n{cta}"
  - "Cambia el Grupo {grupo}: {local} {score_h}–{score_a} {visitante}.\n{cta}"
  - "🔥 Gol de {equipo} ({minuto}'). {local} {score_h}–{score_a} {visitante}.\n{cta}"
  - "Marcador en directo · Grupo {grupo}\n{local} {score_h}–{score_a} {visitante}\n{cta}"
  # Centradas en el goleador (solo si llega el nombre)
  - "⚽ {goleador} la manda al fondo. {local} {score_h}–{score_a} {visitante} ({minuto}').\n{cta}"
  - "Aparece {goleador} en el {minuto}' y marca para {equipo}.\n{local} {score_h}–{score_a} {visitante}\n{cta}"
  - "{goleador} no perdona. {equipo} hace el {marcador} en el Grupo {grupo}.\n{cta}"
  - "Gol de {goleador} ({equipo}), min {minuto}'.\n{local} {score_h}–{score_a} {visitante}\n{cta}"
  # Centradas en la jugada (solo si se ha podido describir)
  - "⚽ {goleador} marca {jugada}. {local} {score_h}–{score_a} {visitante} ({minuto}').\n{cta}"
  - "Gol de {equipo} {jugada} en el {minuto}'. {local} {score_h}–{score_a} {visitante}.\n{cta}"

# ── Pitazo inicial (eliminatoria) ──────────────────────────────────────────────
knockout_kickoff:
  - "⚽ Empieza {local} – {visitante}. Esto es a vida o muerte.\n{cta}"
  - "🔴 En directo: {local} vs {visitante}. El que pierde, a casa.\n{cta}"
  - "Rueda el balón: {local} – {visitante}. Eliminación directa.\n{cta}"
  - "Arranca {local} vs {visitante}. No hay segunda oportunidad.\n{cta}"
  - "{local} contra {visitante}. Un partido, todo o nada.\n{cta}"

# ── Gol (eliminatoria) ─────────────────────────────────────────────────────────
knockout_gol:
  - "⚽ Gol de {equipo}. {local} {score_h}–{score_a} {visitante} · {minuto}'\n{cta}"
  - "{local} {score_h}–{score_a} {visitante}. Marca {equipo} en el {minuto}'.\n{cta}"
  - "¡Gol en el minuto {minuto}! {local} {score_h}–{score_a} {visitante}.\n{cta}"
  - "🔥 {equipo} golpea: {local} {score_h}–{score_a} {visitante} ({minuto}').\n{cta}"
  - "⚽ {goleador} marca para {equipo}. {local} {score_h}–{score_a} {visitante} ({minuto}').\n{cta}"
  - "Gol de {goleador} en el {minuto}'. {local} {score_h}–{score_a} {visitante}.\n{cta}"
  - "⚽ {goleador} la clava {jugada}. {local} {score_h}–{score_a} {visitante} ({minuto}').\n{cta}"

# ── Resultado final (eliminatoria) ─────────────────────────────────────────────
knockout_result:
  - "Final: {local} {score_h}–{score_a} {visitante}.\n{cta}"
  - "⏱ Se acabó. {local} {score_h}–{score_a} {visitante}.\n{cta}"
  - "Pitido final: {local} {score_h}–{score_a} {visitante}. Uno sigue, el otro se va.\n{cta}"
  - "🏆 {local} {score_h}–{score_a} {visitante}. Hay billete para la siguiente ronda.\n{cta}"
  - "{local} {score_h}–{score_a} {visitante}. Adiós a uno, a seguir el otro.\n{cta}"

# ── Resumen matutino ───────────────────────────────────────────────────────────
morning_groups:
  - "Buenos días ☀️ Así están los 12 grupos esta mañana.\n{cta}"
  - "Repaso matutino: toda la clasificación de grupos.\n{cta}"
  - "Empieza el día. Estado de los grupos en directo.\n{cta}"
  - "📊 Foto de los grupos para arrancar el día.\n{cta}"

morning_thirds:
