  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seguimiento en vivo · PredictMotion</title>
  <meta name="description" content="Seguimiento de partido en vivo: marcador, eventos minuto a minuto, alineaciones y probabilidad estimada." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#060916" />

  <script src="/theme.js"></script>

  <style>
    /* ===== partido.html · estilos de página (sistema base en styles.css) ===== */
    body { padding-bottom: var(--sp-9); }
    .live-head { border-bottom: none; }
    .league-head::before { opacity: .9; }

    /* ===== Cabecera del partido ===== */
    .match-hd { padding-block: var(--sp-5) var(--sp-6); }
    .match-hd__meta {
      display: flex; align-items: center; justify-content: center; gap: var(--sp-3);
      font-family: var(--font-mono); font-size: var(--fs-12); letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: var(--sp-5);
    }
    .match-hd__meta .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--faint); }
    .live-pill {
      display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: var(--r-pill);
      background: var(--down-soft); border: 1px solid rgba(255,85,107,.30); color: var(--down);
      font-weight: 700; letter-spacing: .1em;
    }
    .live-pill i { width: 6px; height: 6px; border-radius: 50%; background: var(--down); animation: pm-pulse 1s ease-in-out infinite; }
    @keyframes pm-pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    .scoreline {
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: var(--sp-5);
      max-width: 720px; margin: 0 auto;
    }
    .sl-team { display: flex; align-items: center; gap: var(--sp-4); min-width: 0; }
    .sl-team.home { justify-content: flex-end; text-align: right; }
    .sl-team.away { justify-content: flex-start; }
    .sl-crest {
      width: 56px; height: 56px; flex: none; display: grid; place-items: center;
      background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r-md); padding: 8px;
    }
    .sl-crest img { width: 100%; height: 100%; object-fit: contain; }
    .sl-crest.ph { color: var(--muted); font-family: var(--font-mono); font-weight: 700; font-size: var(--fs-13); }
    .sl-name { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; font-size: var(--fs-22); line-height: 1.05; letter-spacing: .01em; }
    .sl-sub { font-family: var(--font-mono); font-size: var(--fs-12); color: var(--muted); margin-top: 2px; }
    .sl-center { text-align: center; padding: 0 var(--sp-2); }
    .sl-score { font-family: var(--font-display); font-weight: 800; font-size: var(--fs-48); line-height: 1; letter-spacing: .02em; font-variant-numeric: tabular-nums; }
    .sl-score .sep { color: var(--faint); margin: 0 6px; }
    .sl-clock { font-family: var(--font-mono); font-size: var(--fs-13); color: var(--accent); margin-top: var(--sp-2); font-weight: 600; }

    /* Barra de probabilidad 1X2 bajo el marcador */
    .winbar { max-width: 720px; margin: var(--sp-6) auto 0; }
    .winbar__track { display: flex; height: 8px; border-radius: var(--r-pill); overflow: hidden; background: var(--surface-3); }
    .winbar__seg { height: 100%; }
    .winbar__seg.h { background: var(--up); }
    .winbar__seg.d { background: var(--muted); }
    .winbar__seg.a { background: var(--accent); }
    .winbar__legend { display: flex; justify-content: space-between; margin-top: var(--sp-2); font-family: var(--font-mono); font-size: var(--fs-12); color: var(--text-2); }
    .winbar__legend b { color: var(--text); font-weight: 600; }
    .winbar__legend .mid { color: var(--muted); }
    .winbar__note { text-align: center; margin-top: var(--sp-2); font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--faint); }

    /* ===== Contenedores centrados ===== */
    .page-tabs, .tab-section { max-width: var(--maxw); margin-left: auto; margin-right: auto; }
    .page-tabs {
      margin: 0 auto var(--sp-7); display: flex; gap: var(--sp-1);
      border-bottom: 1px solid var(--line); padding-inline: var(--sp-5);
    }
    .page-tab {
      position: relative; padding: var(--sp-4); background: none; border: none; cursor: pointer;
      font-family: var(--font-display); font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
      font-size: var(--fs-16); color: var(--muted); transition: color .18s var(--ease);
    }
    .page-tab:hover:not(.active) { color: var(--text-2); }
    .page-tab.active { color: var(--text); }
    .page-tab.active::after { content:""; position:absolute; left:var(--sp-4); right:var(--sp-4); bottom:-1px; height:2px; background:var(--accent); border-radius:2px; box-shadow:0 0 12px var(--accent-glow); }
    .tab-section { padding-inline: var(--sp-5); }
    .tab-section[hidden] { display: none; }

    .sec-label {
      font-family: var(--font-mono); font-size: var(--fs-12); font-weight: 500; text-transform: uppercase;
      letter-spacing: .16em; color: var(--muted); margin-bottom: var(--sp-4);
      display: flex; align-items: center; gap: var(--sp-3);
    }
    .sec-label::after { content:""; flex:1; height:1px; background: var(--line-soft); }

    /* ============================================================
       CAMPO — dibujo de las alineaciones por posición
       ============================================================ */
    .pitch-wrap { max-width: 460px; margin: 0 auto var(--sp-6); }
    .pitch-forms { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--sp-3); }
    .pitch-form { display: flex; align-items: center; gap: var(--sp-2); font-family: var(--font-mono); font-size: var(--fs-12); text-transform: uppercase; letter-spacing: .06em; color: var(--text-2); white-space: nowrap; }
    .pitch-form i { width: 12px; height: 12px; border-radius: 50%; flex: none; }
    .pitch-form.home i { background: var(--up); }
    .pitch-form.away i { background: var(--accent); }
    .pitch-form b { font-family: var(--font-display); font-weight: 700; letter-spacing: .08em; color: var(--text); font-size: var(--fs-14); }

    .pitch {
      --pitch-bg: #0b2c1e; --pitch-bg2: #0e3324; --pitch-line: rgba(255,255,255,.16);
      position: relative; aspect-ratio: 68 / 104; width: 100%;
      background:
        repeating-linear-gradient(0deg, var(--pitch-bg) 0 8.33%, var(--pitch-bg2) 8.33% 16.66%);
      border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    html[data-theme="light"] .pitch { --pitch-bg: #2f9159; --pitch-bg2: #34995f; --pitch-line: rgba(255,255,255,.55); }
    /* Marcas del campo */
    .pitch__mark { position: absolute; border: 2px solid var(--pitch-line); pointer-events: none; }
    .pitch__halfway { left: 0; right: 0; top: 50%; height: 0; border: none; border-top: 2px solid var(--pitch-line); }
    .pitch__circle { left: 50%; top: 50%; width: 30%; aspect-ratio: 1; transform: translate(-50%,-50%); border-radius: 50%; }
    .pitch__spot { left: 50%; top: 50%; width: 5px; height: 5px; transform: translate(-50%,-50%); border-radius: 50%; background: var(--pitch-line); border: none; }
    .pitch__box { left: 50%; transform: translateX(-50%); width: 56%; }
    .pitch__box.top { top: -2px; height: 14%; border-top: none; border-radius: 0 0 4px 4px; }
    .pitch__box.bot { bottom: -2px; height: 14%; border-bottom: none; border-radius: 4px 4px 0 0; }
    .pitch__six { left: 50%; transform: translateX(-50%); width: 28%; }
    .pitch__six.top { top: -2px; height: 6%; border-top: none; border-radius: 0 0 3px 3px; }
    .pitch__six.bot { bottom: -2px; height: 6%; border-bottom: none; border-radius: 3px 3px 0 0; }

    /* Jugador sobre el campo */
    .pp { position: absolute; transform: translate(-50%, -50%); width: 54px; text-align: center; z-index: 1; }
    .pp__dot {
      width: 30px; height: 30px; margin: 0 auto; border-radius: 50%; display: grid; place-items: center;
      font-family: var(--font-mono); font-weight: 700; font-size: var(--fs-13); font-variant-numeric: tabular-nums;
      border: 2px solid rgba(255,255,255,.65); box-shadow: 0 2px 6px rgba(0,0,0,.4);
    }
    .pp.home .pp__dot { background: var(--up); color: #04150d; }
    .pp.away .pp__dot { background: var(--accent); color: #fff; }
    .pp__name {
      margin-top: 3px; font-size: 10px; font-weight: 600; color: #fff; line-height: 1.1;
      white-space: nowrap; text-shadow: 0 1px 3px rgba(0,0,0,.85); letter-spacing: .01em;
    }
    .pp__badge { position: absolute; top: -4px; right: 6px; width: 13px; height: 13px; border-radius: 50%; display: grid; place-items: center; font-size: 8px; background: var(--up); color: #04150d; border: 1.5px solid var(--pitch-bg); }
    .pp__badge.yc { background: var(--po); }
    @media (max-width: 480px) {
      .pp { width: 46px; }
      .pp__dot { width: 26px; height: 26px; font-size: var(--fs-12); }
      .pp__name { font-size: 9px; }
    }

    /* ============================================================
       ALINEACIONES — dos columnas idénticas (mismo ancho y alto)
       ============================================================ */
    .lineups { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); align-items: stretch; }
    .lineup {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden;
    }
    .lineup__head {
      display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-4) var(--sp-5);
      background: var(--surface-2); border-bottom: 1px solid var(--line);
    }
    .lineup.away .lineup__head { flex-direction: row-reverse; text-align: right; }
    .lineup__crest { width: 28px; height: 28px; flex: none; display: grid; place-items: center; }
    .lineup__crest img { width: 100%; height: 100%; object-fit: contain; }
    .lineup__crest.ph { background: var(--surface-3); border-radius: var(--r-xs); }
    .lineup__team { font-family: var(--font-display); font-weight: 700; text-transform: uppercase; font-size: var(--fs-16); letter-spacing: .02em; line-height: 1; }
    .lineup__form { font-family: var(--font-mono); font-size: var(--fs-12); color: var(--accent); margin-top: 3px; letter-spacing: .08em; }
    .lineup.away .lineup__head .lineup__meta { margin-left: 0; margin-right: auto; }
    .lineup__meta { display: flex; flex-direction: column; }

    .xi { display: flex; flex-direction: column; padding: var(--sp-2) 0; }
    .player { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-2) var(--sp-5); }
    .lineup.away .player { flex-direction: row-reverse; text-align: right; }
    .player__num {
      width: 24px; height: 24px; flex: none; display: grid; place-items: center; border-radius: var(--r-xs);
      background: var(--surface-3); color: var(--text-2); font-family: var(--font-mono); font-weight: 600; font-size: var(--fs-12);
      font-variant-numeric: tabular-nums;
    }
    .player.gk .player__num { background: var(--accent-soft); color: var(--accent); }
    .player__name { font-size: var(--fs-14); font-weight: 500; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player__ev { display: inline-flex; align-items: center; gap: 5px; flex: none; }
    .ev-ic { width: 13px; height: 13px; display: inline-grid; place-items: center; font-size: 10px; }
    .ev-goal { color: var(--up); }
    .ev-yc { width: 9px; height: 12px; border-radius: 2px; background: var(--po); display: inline-block; }
    .ev-rc { width: 9px; height: 12px; border-radius: 2px; background: var(--down); display: inline-block; }
    .ev-sub-out { color: var(--down); }
    .player__min { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

    .bench { border-top: 1px solid var(--line-soft); margin-top: auto; padding: var(--sp-3) 0 var(--sp-2); }
    .bench__label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--faint); padding: 0 var(--sp-5) var(--sp-2); }
    .lineup.away .bench__label { text-align: right; }
    .bench .player__name { color: var(--text-2); font-weight: 400; }
    .bench .player { padding-block: 5px; }
    .coach { display: flex; align-items: center; gap: var(--sp-2); padding: var(--sp-3) var(--sp-5); border-top: 1px solid var(--line-soft); font-size: var(--fs-13); color: var(--text-2); }
    .lineup.away .coach { flex-direction: row-reverse; text-align: right; }
    .coach span { font-family: var(--font-mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); }

    /* ============================================================
       MINUTO A MINUTO — timeline con espina central
       ============================================================ */
    .timeline { position: relative; max-width: 760px; margin: 0 auto; padding: var(--sp-2) 0; }
    .timeline::before { content:""; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; transform: translateX(-50%); background: var(--line); }
    .tl-row { position: relative; display: grid; grid-template-columns: 1fr 64px 1fr; align-items: center; padding: var(--sp-2) 0; }
    .tl-card {
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md);
      padding: var(--sp-3) var(--sp-4); display: inline-flex; align-items: center; gap: var(--sp-3); max-width: 100%;
    }
    .tl-row.home .tl-card { grid-column: 1; justify-self: end; flex-direction: row-reverse; text-align: right; }
    .tl-row.away .tl-card { grid-column: 3; justify-self: start; }
    .tl-min {
      grid-column: 2; justify-self: center; z-index: 1;
      width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center;
      background: var(--surface-2); border: 1px solid var(--line);
      font-family: var(--font-mono); font-weight: 600; font-size: var(--fs-13); color: var(--text); font-variant-numeric: tabular-nums;
    }
    .tl-ev-ic { width: 26px; height: 26px; flex: none; border-radius: 50%; display: grid; place-items: center; }
    .tl-ev-ic svg { width: 15px; height: 15px; }
    .ic-goal { background: var(--up-soft); color: var(--up); }
    .ic-yc { background: var(--po-soft); color: var(--po); }
    .ic-rc { background: var(--down-soft); color: var(--down); }
    .ic-sub { background: var(--accent-soft); color: var(--accent); }
    .tl-body { min-width: 0; }
    .tl-title { font-size: var(--fs-14); font-weight: 600; color: var(--text); white-space: nowrap; }
    .tl-desc { font-size: var(--fs-12); color: var(--muted); margin-top: 1px; }
    .tl-goal-card { border-color: var(--accent-line); }
    .tl-min.goal { border-color: var(--up); color: var(--up); }

    /* Separador de fase (descanso, inicio…) */
    .tl-divider { position: relative; display: flex; justify-content: center; padding: var(--sp-3) 0; }
    .tl-divider span {
      position: relative; z-index: 1; background: var(--bg); border: 1px solid var(--line); border-radius: var(--r-pill);
      padding: 4px 14px; font-family: var(--font-mono); font-size: var(--fs-12); letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
    }

    /* ============================================================
       DATOS — barras comparativas divergentes
       ============================================================ */
    .stats-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); padding: var(--sp-6) var(--sp-6) var(--sp-5); max-width: 760px; margin: 0 auto; }
    .stats-legend { display: flex; align-items: center; justify-content: center; gap: var(--sp-5); margin-bottom: var(--sp-6); font-family: var(--font-mono); font-size: var(--fs-12); text-transform: uppercase; letter-spacing: .06em; }
    .stats-legend .sl-key { display: inline-flex; align-items: center; gap: var(--sp-2); color: var(--text-2); }
    .stats-legend i { width: 10px; height: 10px; border-radius: 3px; }
    .stats-legend .home i { background: var(--up); }
    .stats-legend .away i { background: var(--accent); }

    .stat { margin-bottom: var(--sp-5); }
    .stat:last-child { margin-bottom: 0; }
    .stat__top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: var(--sp-2); }
    .stat__val { font-family: var(--font-mono); font-weight: 700; font-size: var(--fs-16); color: var(--text); font-variant-numeric: tabular-nums; min-width: 48px; }
    .stat__val.away { text-align: right; }
    .stat__val.lead-h { color: var(--up); }
    .stat__val.lead-a { color: var(--accent); }
    .stat__label { font-family: var(--font-mono); font-size: var(--fs-12); letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .stat__bars { display: flex; align-items: center; gap: 3px; }
    .stat__bar { flex: 1; height: 6px; background: var(--surface-3); border-radius: var(--r-pill); overflow: hidden; display: flex; }
    .stat__bar.home { justify-content: flex-end; }
    .stat__fill { height: 100%; border-radius: var(--r-pill); }
    .stat__bar.home .stat__fill { background: var(--up); }
    .stat__bar.away .stat__fill { background: var(--accent); }

    /* Posesión: barra única partida */
    .possession { margin-bottom: var(--sp-6); }
    .poss__track { display: flex; height: 28px; border-radius: var(--r-sm); overflow: hidden; }
    .poss__seg { display: flex; align-items: center; font-family: var(--font-mono); font-weight: 700; font-size: var(--fs-13); color: #fff; padding: 0 var(--sp-3); }
    .poss__seg.home { background: var(--up); }
    .poss__seg.away { background: var(--accent); justify-content: flex-end; }
    html[data-theme="light"] .poss__seg { color: #fff; }
    .poss__label { font-family: var(--font-mono); font-size: var(--fs-12); letter-spacing: .1em; text-transform: uppercase; color: var(--muted); text-align: center; margin-top: var(--sp-2); }

    /* Banner no disponible */
    .lv-msg { max-width: 600px; margin: 60px auto; text-align: center; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: var(--sp-8); color: var(--text-2); }

    /* Slot de anuncio dentro de cada pestaña */
    .tab-section .ad-wrap { margin-top: var(--sp-7); }

    .footer { max-width: var(--maxw); margin: var(--sp-8) auto 0; }

    @media (max-width: 720px) {
      .lineups { grid-template-columns: 1fr; }
      .scoreline { gap: var(--sp-3); }
      .sl-name { font-size: var(--fs-18); }
      .sl-score { font-size: var(--fs-36); }
      .sl-crest { width: 44px; height: 44px; }
      .tl-row { grid-template-columns: 1fr 48px 1fr; }
      .tl-row.home .tl-card, .tl-row.away .tl-card { flex-direction: row; text-align: left; justify-self: stretch; }
      .tl-title { white-space: normal; }
    }
  </style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NG2T7CM4"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

  <!-- ===== BARRA SUPERIOR ===== -->
  <header class="topbar">
    <div class="wrap topbar__inner">
      <a class="logo" href="/" aria-label="PredictMotion — inicio">
        <span class="logo__dot" aria-hidden="true"></span>Predict<b>Motion</b>
      </a>
      <div class="topbar__right">
        <nav class="topbar__nav" aria-label="Competiciones">
          <a href="/hypermotion">Hypermotion</a>
          <a href="/laliga">LaLiga</a>
          <a href="/mundial">Mundial&nbsp;2026</a>
        </nav>
        <button class="theme-toggle" data-theme-toggle type="button" aria-pressed="false" aria-label="Cambiar tema" title="Tema claro / oscuro">
          <span class="tt-opt tt-dark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.5 6.5 0 0 0 9.8 9.8Z"/></svg></span>
          <span class="tt-opt tt-light" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== CABECERA DEL PARTIDO (la rellena PMLive sobre #match-header) ===== -->
  <section class="league-head live-head">
    <div class="wrap">
      <a class="back-link" id="back-link" href="/">← Volver</a>
      <div id="match-header">
        <div class="match-hd">
          <div class="match-hd__meta"><span>Cargando…</span></div>
        </div>
      </div>
    </div>
  </section>
