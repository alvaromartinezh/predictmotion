<!-- ===== CABECERA DEL PARTIDO (la rellena PMLive) ===== -->
<section class="league-head live-head">
  <div class="wrap">
    <a class="back-link" id="back-link" href="/">← Volver</a>
    <div id="match-header">
      <div class="lv-skel" style="height:120px"></div>
    </div>
  </div>
</section>

<main class="wrap">
  <!-- Banner de error / no disponible -->
  <div id="live-unavailable" class="lv-msg" style="display:none"></div>

  <div id="live-content" style="display:none">
    <div class="page-tabs">
      <button class="page-tab active" type="button" data-section="alineacion">Alineación</button>
      <button class="page-tab" type="button" data-section="minuto">Minuto a minuto</button>
      <button class="page-tab" type="button" data-section="datos">Datos</button>
    </div>

    <!-- ===== ALINEACIÓN ===== -->
    <div class="tab-section" data-section="alineacion">
      <div id="lv-lineups"><div class="lv-skel" style="height:300px"></div></div>
      <div class="ad-wrap"><span class="ad-label">Publicidad</span>
        <div class="ad-slot" data-ad-slot="mid"></div></div>
    </div>

    <!-- ===== MINUTO A MINUTO ===== -->
    <div class="tab-section" data-section="minuto" hidden>
      <div id="lv-timeline"><div class="lv-skel" style="height:300px"></div></div>
      <div class="ad-wrap"><span class="ad-label">Publicidad</span>
        <div class="ad-slot" data-ad-slot="mid"></div></div>
    </div>

    <!-- ===== DATOS ===== -->
    <div class="tab-section" data-section="datos" hidden>
      <div id="lv-stats"><div class="lv-skel" style="height:300px"></div></div>
      <div class="ad-wrap"><span class="ad-label">Publicidad</span>
        <div class="ad-slot" data-ad-slot="mid"></div></div>
    </div>
  </div>
</main>
